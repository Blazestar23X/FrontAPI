<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Plumbing Service</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    .priority-options {
      display: flex;
      gap: 10px;
    }
    .priority-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      background: white;
    }
    .priority-btn:hover {
      border-color: #667eea;
    }
    .priority-btn.selected.urgent {
      border-color: #d93025;
      background: #fce8e6;
      color: #d93025;
    }
    .priority-btn.selected.standard {
      border-color: #f9ab00;
      background: #fef7e0;
      color: #e37400;
    }
    .priority-btn.selected.low {
      border-color: #188038;
      background: #e6f4ea;
      color: #188038;
    }
    .priority-btn input {
      display: none;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .message.success {
      display: block;
      background: #e6f4ea;
      color: #188038;
      border: 1px solid #ceead6;
    }
    .message.error {
      display: block;
      background: #fce8e6;
      color: #d93025;
      border: 1px solid #f5c6c2;
    }
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>📞 Request Plumbing Service</h1>
    <p class="subtitle">Fill out this form and a plumber will contact you shortly.</p>

    <div id="message" class="message"></div>

    <form id="requestForm" onsubmit="return submitRequest(event)">
      <div class="form-group">
        <label for="name">Your Name *</label>
        <input type="text" id="name" required placeholder="e.g. John Smith">
      </div>

      <div class="form-group">
        <label for="phone">Phone Number *</label>
        <input type="tel" id="phone" required placeholder="e.g. +1 (555) 123-4567">
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" required placeholder="e.g. john@example.com">
      </div>

      <div class="form-group">
        <label for="description">Describe the Plumbing Issue *</label>
        <textarea id="description" required placeholder="e.g. The kitchen sink is leaking and water is pooling under the cabinet..."></textarea>
      </div>

      <div class="form-group">
        <label>Priority Level</label>
        <div class="priority-options">
          <div class="priority-btn" data-value="urgent" onclick="selectPriority(this)">
            🔴 Urgent
            <input type="radio" name="priority" value="urgent">
          </div>
          <div class="priority-btn selected standard" data-value="standard" onclick="selectPriority(this)">
            🟡 Standard
            <input type="radio" name="priority" value="standard" checked>
          </div>
          <div class="priority-btn" data-value="low" onclick="selectPriority(this)">
            🟢 Low
            <input type="radio" name="priority" value="low">
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span id="submitText">Submit Request</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
  </div>

  <script>
    function selectPriority(el) {
      document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      el.querySelector('input').checked = true;
    }

    async function submitRequest(e) {
      e.preventDefault();
      
      const messageEl = document.getElementById('message');
      const submitBtn = document.getElementById('submitBtn');
      const submitText = document.getElementById('submitText');
      const spinner = document.getElementById('spinner');
      
      messageEl.className = 'message';
      messageEl.style.display = 'none';
      
      // Show loading
      submitBtn.disabled = true;
      submitText.style.display = 'none';
      spinner.style.display = 'block';

      const form = e.target;
      const data = {
        name: form.name.value.trim(),
        phone: form.phone.value.trim(),
        email: form.email.value.trim(),
        description: form.description.value.trim(),
        priority: form.querySelector('input[name="priority"]:checked').value,
        source: 'web'
      };

      try {
        const response = await fetch('/api/requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
          messageEl.className = 'message success';
          messageEl.textContent = '✅ Request submitted successfully! A plumber will contact you shortly. Check your email for confirmation.';
          messageEl.style.display = 'block';
          form.reset();
          document.querySelector('.priority-btn.standard').classList.add('selected');
        } else {
          throw new Error(result.error || 'Submission failed');
        }
      } catch (err) {
        messageEl.className = 'message error';
        messageEl.textContent = '❌ ' + err.message + '. Please try again or call us directly.';
        messageEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitText.style.display = 'inline';
        spinner.style.display = 'none';
      }

      return false;
    }
  </script>
</body>
</html>
